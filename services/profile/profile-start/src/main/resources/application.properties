# ==============================
# Import other configurations
# ==============================
spring.config.import=optional:classpath:resilience4j.properties, vault://

# ==============================
# Application Configuration
# ==============================
server.port=${SERVER_PORT:5008}
worker.id=${WORKER_ID:8}
spring.application.name=profile
spring.security.user.name=${SECURITY_USER:admin}
spring.security.user.password=${SECURITY_PASSWORD:123456}
springdotenv.directory=../

# ==============================
# Devtools Configuration
# ==============================
spring.devtools.restart.enabled=false

# ==============================
# Kafka Configuration
# ==============================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:5003}

# ==============================
# Redis Configuration
# ==============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6387}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}

# ==============================
# Mail Configuration
# ==============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=true


# ==============================
# DataSource
# ==============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5440}/${DB_NAME:chatter}?sslmode=disable
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000


# ==============================
# Eureka / Discovery
# ==============================
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
spring.cloud.inetutils.preferred-networks=${PREFERRED_NETWORKS:127.0.0.1}
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:5000/eureka}
eureka.client.healthcheck.enabled=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true


# ==============================
# Vault Configuration
# ==============================
spring.cloud.vault.host=${VAULT_HOST:localhost}
spring.cloud.vault.port=${VAULT_PORT:5002}
spring.cloud.vault.scheme=${VAULT_SCHEME:http}
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.token=${VAULT_TOKEN:dev-root-token}


# ==============================
# Vault Database Secrets Engine For Database (doesn't support Redis)
# ==============================
spring.cloud.vault.database.enabled=true
spring.cloud.vault.database.backend=database
spring.cloud.vault.database.role=profile-postgresql-approle
spring.cloud.vault.database.username-property=spring.datasource.username
spring.cloud.vault.database.password-property=spring.datasource.password


# ==============================
# Vault Config Lifecycle Management
# ==============================
spring.cloud.vault.config.lifecycle.enabled=true
spring.cloud.vault.config.lifecycle.min-renewal=15m
spring.cloud.vault.config.lifecycle.expiry-threshold=30m
spring.cloud.vault.config.lifecycle.lease-endpoints=leases
spring.cloud.vault.config.lifecycle.lease-strategy=retainonerror


# ==============================
# Vault KV (Key-Value) Secrets Engine
# ==============================
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.default-context=common/jwt/rs256
# if does not set implicitly, the default path would be spring.cloud.vault.kv.backend + spring.application.name
spring.cloud.vault.kv.application-name=profile


# ==============================
# Logging Configuration
# ==============================
logging.config=classpath:log4j2.properties

# ==============================
# Spring Boot Actuator Configuration
# ==============================
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,loggers,env