# ==============================
# Import other configurations
# ==============================
spring.config.import=optional:classpath:resilience4j.properties, vault://

# ==============================
# Application Configuration
# ==============================
server.port=${SERVER_PORT:5008}
worker.id=${WORKER_ID:8}
spring.application.name=authentication-service
spring.security.user.name=${SECURITY_USER:admin}
spring.security.user.password=${SECURITY_PASSWORD:123456}

# ==============================
# Devtools Configuration
# ==============================
spring.devtools.restart.enabled=false

# ==============================
# Kafka Configuration
# ==============================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:5003}

# ==============================
# Redis Configuration
# ==============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6387}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}

# ==============================
# Mail Configuration
# ==============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
# Gợi ý: Nếu không dùng Vault cho Mail, bạn cần 2 dòng này:
# spring.mail.username=${MAIL_USERNAME:your_dev_email@gmail.com}
# spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================
# DataSource
# ==============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5440}/${DB_NAME:chatter}?sslmode=disable
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ... (Flyway giữ nguyên)

# ==============================
# Eureka / Discovery
# ==============================
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
spring.cloud.inetutils.preferred-networks=${PREFERRED_NETWORKS:127.0.0.1}
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:5000/eureka}
# ... (Phần còn lại của Eureka giữ nguyên)

# ==============================
# Vault Configuration
# ==============================
spring.cloud.vault.host=${VAULT_HOST:localhost}
spring.cloud.vault.port=${VAULT_PORT:5002}
spring.cloud.vault.scheme=${VAULT_SCHEME:http}
spring.cloud.vault.authentication=TOKEN
# Lưu ý: Vì VAULT_TOKEN không có default ở bản gốc, tôi để tạm default là dev-root-token. Bạn có thể sửa lại.
spring.cloud.vault.token=${VAULT_TOKEN:dev-root-token}

# ... (Phần config Vault Engine giữ nguyên)